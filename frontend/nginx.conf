# Serves the built SPA. The unprivileged nginx image listens on 8080 as uid 101.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: unknown paths resolve to the app shell, not a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed asset filenames, so they can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The HTML shell must never be cached, or clients pin to a stale bundle.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
